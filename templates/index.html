<!DOCTYPE html>
<html>
<head>
    <title>Book Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h1>My Favorite Books</h1>
        <div class="filters">
            <input type="text" id="filterAuthor" placeholder="Author">
            <input type="text" id="filterCategory" placeholder="Category">
            <button onclick="loadBooks()">Apply Filters</button>
        </div>
    </nav>
    <div id="book-container" class="grid"></div>

    <!-- Modal for Rent -->
    <div id="rentModal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>Rent Book</h3>
            <input type="email" id="userEmail" placeholder="Your Email">
            <select id="duration">
                <option value="2">2 Weeks</option>
                <option value="4">1 Month</option>
                <option value="12">3 Months</option>
            </select>
            <button onclick="confirmRent()">Confirm</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
